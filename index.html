<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LineUp Maker Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════════════════════
       AUTH GATE — only visible when NOT logged in
  ══════════════════════════════════════════════════════════ -->
  <div v-if="!user" class="auth-gate">
    <div class="auth-gate__card">
      <div class="auth-gate__logo">
        <i class="bi bi-file-earmark-pdf-fill"></i>
        <span>LineUp Maker</span>
        <span class="auth-gate__badge">[Demo]</span>
      </div>
      <p class="auth-gate__sub">Sign in to access your lyric and chord library.</p>

      <div v-if="alert.message" :class="`alert alert-${alert.type} py-2 mb-3`" role="alert" style="font-size:0.85rem;">
        <i :class="`bi ${alert.type === 'success' ? 'bi-check-circle' : 'bi-exclamation-triangle'} me-1`"></i>
        {{ alert.message }}
      </div>

      <form @submit.prevent="login" autocomplete="on" novalidate>
        <div class="mb-3">
          <label class="form-label-app" for="gate-email">Email</label>
          <input id="gate-email" type="email" class="form-control-app w-100"
            v-model="loginForm.email" placeholder="you@example.com"
            required autocomplete="email" />
        </div>
        <div class="mb-4">
          <label class="form-label-app" for="gate-pass">Password</label>
          <div class="pw-wrap">
            <input id="gate-pass" :type="showGatePassword ? 'text' : 'password'"
              class="form-control-app w-100"
              v-model="loginForm.password" placeholder="••••••••"
              required autocomplete="current-password" />
            <button type="button" class="pw-toggle" @click="showGatePassword = !showGatePassword"
              :title="showGatePassword ? 'Hide password' : 'Show password'">
              <i :class="showGatePassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-app w-100 py-2" :disabled="loggingIn">
          <span v-if="loggingIn" class="spinner-border spinner-border-sm me-2"></span>
          <i v-else class="bi bi-box-arrow-in-right me-2"></i>
          {{ loggingIn ? 'Signing in…' : 'Sign In' }}
        </button>
      </form>

      <p class="auth-gate__footer">&copy; 2026 LineUp Maker [Demo]. All rights reserved.</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       MAIN APP — only visible when logged in
  ══════════════════════════════════════════════════════════ -->
  <template v-if="user">

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg navbar-app">
    <div class="container-fluid px-3 px-md-4">

      <a href="#" class="navbar-brand brand-logo" @click.prevent="switchTab('library')">
        <i class="bi bi-file-earmark-pdf-fill"></i>
        <span class="brand-name">LineUp Maker</span>
        <span class="brand-demo">[Demo]</span>
      </a>

      <!-- Mobile: builder badge + toggler -->
      <div class="d-flex align-items-center gap-2 d-lg-none">
        <button v-if="selectedItems.length > 0"
          class="btn btn-sm btn-gold-pill"
          @click="switchTab('builder')">
          <i class="bi bi-layers-fill me-1"></i>{{ selectedItems.length }}
        </button>
        <button class="navbar-toggler" type="button"
          data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-1 py-2 py-lg-0">

          <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'library' }"
              href="#" @click.prevent="switchTab('library')">
              <i class="bi bi-collection"></i> Lyric Library
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'chords' }"
              href="#" @click.prevent="switchTab('chords')">
              <i class="bi bi-music-note-list"></i> Chord Library
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'guitarchords' }"
              href="#" @click.prevent="switchTab('guitarchords')">
              <i class="bi bi-guitar"></i> Guitar Chords
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link position-relative" :class="{ active: activeTab === 'builder' }"
              href="#" @click.prevent="switchTab('builder')">
              <i class="bi bi-layers"></i> Builder
              <span v-if="selectedItems.length > 0" class="badge-count">{{ selectedItems.length }}</span>
            </a>
          </li>

          <li class="nav-item dropdown" v-if="isAdminUser">
            <a class="nav-link dropdown-toggle" href="#" role="button"
              data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-shield-lock"></i> Admin
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <a class="dropdown-item" href="#"
                  data-bs-toggle="modal" data-bs-target="#createUserModal">
                  <i class="bi bi-person-plus me-1"></i> Create User
                </a>
              </li>
            </ul>
          </li>

          <!-- User pill -->
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
            <div class="nav-user-pill">
              <span class="nav-user-pill__name">
                <i class="bi bi-person-circle me-1"></i>{{ user.username }}
              </span>
              <button class="nav-user-pill__logout" @click="logout" title="Sign out">
                <i class="bi bi-box-arrow-right"></i>
              </button>
            </div>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Global Alert ──────────────────────────────────── -->
  <div class="container-fluid px-3 px-md-4 mt-3">
    <div v-if="alert.message"
      :class="`alert alert-${alert.type} alert-dismissible fade show`" role="alert">
      <i :class="`bi ${alert.type === 'success' ? 'bi-check-circle' : 'bi-exclamation-triangle'} me-2`"></i>
      {{ alert.message }}
      <button type="button" class="btn-close" @click="alert.message = ''"></button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       TAB: LYRIC LIBRARY
  ══════════════════════════════════════════════════════ -->
  <div v-show="activeTab === 'library'" class="container-fluid px-3 px-md-4 py-3">
    <div class="section-header">
      <div>
        <h2 class="section-title">Lyric Library</h2>
        <p class="section-sub">Search lyrics here. Click a card to view full details.</p>
      </div>
      <button v-if="isAdminUser" class="btn btn-primary-app" @click="switchToUpload('song')">
        <i class="bi bi-plus-lg"></i> Add Lyrics
      </button>
    </div>

    <div class="search-bar-wrap">
      <div class="search-group">
        <div class="search-row-main">
          <span class="search-icon"><i class="bi bi-search"></i></span>
          <input type="text" class="search-input" placeholder="Search by title…"
            v-model="searchQuery" @input="debouncedSearch" />
          <button class="btn-search-clear" @click="clearSearch" title="Clear">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="search-row-cat">
          <span class="search-cat-icon"><i class="bi bi-funnel"></i></span>
          <select class="category-input" v-model="categoryFilter">
            <option value="">All Categories</option>
            <option value="Mass">Mass</option>
            <option value="Worship">Worship</option>
          </select>
        </div>
      </div>
    </div>

    <div v-if="loading" class="loading-wrap">
      <div class="spinner-border text-primary" role="status"></div>
      <span>Loading songs…</span>
    </div>
    <div v-else-if="contentItems.length === 0" class="empty-state">
      <i class="bi bi-inbox-fill"></i>
      <p v-if="isAdminUser">No songs found. <a href="#" @click.prevent="switchToUpload('song')">Upload something!</a></p>
      <p v-else>No songs found.</p>
    </div>
    <div v-else class="row g-3 mt-1">
      <div v-for="item in contentItems" :key="item._id" class="col-12 col-sm-6 col-lg-4">
        <div class="content-card" :class="{ 'content-card--selected': isSelected(item._id) }"
          @click="openDetail(item, 'library')">
          <div class="content-card__header">
            <span class="content-card__category">{{ item.category }}</span>
            <span v-if="isSelected(item._id)" class="content-card__check">
              <i class="bi bi-check-circle-fill"></i>
            </span>
          </div>
          <h5 class="content-card__title">{{ item.title }}</h5>
          <p class="content-card__body">{{ truncate(item.body, 120) }}</p>
          <div class="content-card__footer">
            <span class="content-card__author"><i class="bi bi-person-fill"></i> {{ item.author }}</span>
            <span class="content-card__date">{{ formatDate(item.createdAt) }}</span>
          </div>
          <div v-if="item.tags && item.tags.length" class="content-card__tags">
            <span v-for="tag in item.tags" :key="tag" class="tag-pill">{{ tag }}</span>
          </div>
          <div v-if="hasResources(item)" class="content-card__resources">
            <span v-for="part in activeVoicings(item)" :key="part" class="resource-badge resource-badge--audio">
              <i class="bi bi-mic-fill"></i> {{ voicingLabel(part) }}
            </span>
            <span v-if="item.scoreUrl" class="resource-badge resource-badge--score">
              <i class="bi bi-file-earmark-music-fill"></i> Score
            </span>
          </div>
          <div class="content-card__actions" @click.stop>
            <div class="d-flex gap-1 flex-wrap">
              <button @click="toggleSelect(item)" class="btn btn-sm"
                :class="isSelected(item._id) ? 'btn-success' : 'btn-outline-secondary'">
                <i :class="isSelected(item._id) ? 'bi bi-check-circle-fill' : 'bi bi-plus-circle'"></i>
                {{ isSelected(item._id) ? 'Added' : 'Add to Builder' }}
              </button>
              <div class="btn-group" v-if="isAdminUser">
                <button @click="openEditModal(item)" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-pencil-square"></i>
                </button>
                <button @click="deleteItem(item._id)" class="btn btn-sm btn-outline-danger">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <nav v-if="totalPages > 1" class="mt-4 d-flex justify-content-center">
      <ul class="pagination pagination-app flex-wrap">
        <li class="page-item" :class="{ disabled: currentPage === 1 }">
          <a class="page-link" href="#" @click.prevent="goToPage(currentPage - 1)"><i class="bi bi-chevron-left"></i></a>
        </li>
        <li v-for="p in totalPages" :key="p" class="page-item" :class="{ active: p === currentPage }">
          <a class="page-link" href="#" @click.prevent="goToPage(p)">{{ p }}</a>
        </li>
        <li class="page-item" :class="{ disabled: currentPage === totalPages }">
          <a class="page-link" href="#" @click.prevent="goToPage(currentPage + 1)"><i class="bi bi-chevron-right"></i></a>
        </li>
      </ul>
    </nav>

    <div v-if="selectedItems.length > 0" class="floating-bar">
      <span class="floating-bar__count">
        <strong>{{ selectedItems.length }}</strong> item{{ selectedItems.length > 1 ? 's' : '' }} selected
      </span>
      <div class="floating-bar__actions">
        <button class="btn btn-primary-app btn-sm" @click="switchTab('builder')">
          <i class="bi bi-layers-fill me-1"></i> Builder
        </button>
        <button class="btn btn-outline-light btn-sm" @click="clearSelection">
          <i class="bi bi-x"></i> Clear
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       TAB: CHORD LIBRARY
  ══════════════════════════════════════════════════════ -->
  <div v-show="activeTab === 'chords'" class="container-fluid px-3 px-md-4 py-3">
    <div class="section-header">
      <div>
        <h2 class="section-title">Chord Library</h2>
        <p class="section-sub">Search chords here. Click a card to view full details.</p>
      </div>
      <button v-if="isAdminUser" class="btn btn-primary-app" @click="switchToUpload('chord')">
        <i class="bi bi-plus-lg"></i> Add Chords
      </button>
    </div>

    <div class="search-bar-wrap">
      <div class="search-group">
        <div class="search-row-main">
          <span class="search-icon"><i class="bi bi-search"></i></span>
          <input type="text" class="search-input" placeholder="Search by title…"
            v-model="chordSearchQuery" @input="debouncedChordSearch" />
          <button class="btn-search-clear" @click="clearChordSearch" title="Clear">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="search-row-cat">
          <span class="search-cat-icon"><i class="bi bi-funnel"></i></span>
          <select class="category-input" v-model="chordCategoryFilter">
            <option value="">All Categories</option>
            <option value="Mass">Mass</option>
            <option value="Worship">Worship</option>
          </select>
        </div>
      </div>
    </div>

    <div v-if="chordLoading" class="loading-wrap">
      <div class="spinner-border text-primary" role="status"></div>
      <span>Loading chords…</span>
    </div>
    <div v-else-if="chordItems.length === 0" class="empty-state">
      <i class="bi bi-music-note-list"></i>
      <p v-if="isAdminUser">No chords found. <a href="#" @click.prevent="switchToUpload('chord')">Upload one!</a></p>
      <p v-else>No chords found.</p>
    </div>
    <div v-else class="row g-3 mt-1">
      <div v-for="item in chordItems" :key="item._id" class="col-12 col-sm-6 col-lg-4">
        <div class="content-card content-card--chord"
          :class="{ 'content-card--selected': isSelected(item._id) }"
          @click="openDetail(item, 'chords')">
          <div class="content-card__header">
            <span class="content-card__category">{{ item.category }}</span>
            <div class="d-flex align-items-center gap-2">
              <span class="chord-type-badge"><i class="bi bi-music-note-beamed"></i> Chords</span>
              <span v-if="isSelected(item._id)" class="content-card__check">
                <i class="bi bi-check-circle-fill"></i>
              </span>
            </div>
          </div>
          <h5 class="content-card__title">{{ item.title }}</h5>
          <p class="content-card__body content-card__body--chord">{{ truncate(item.body, 120) }}</p>
          <div class="content-card__footer">
            <span class="content-card__author"><i class="bi bi-person-fill"></i> {{ item.author }}</span>
            <span class="content-card__date">{{ formatDate(item.createdAt) }}</span>
          </div>
          <div v-if="item.tags && item.tags.length" class="content-card__tags">
            <span v-for="tag in item.tags" :key="tag" class="tag-pill">{{ tag }}</span>
          </div>
          <div class="content-card__actions" @click.stop>
            <div class="d-flex gap-1 flex-wrap">
              <button @click="toggleSelect(item)" class="btn btn-sm"
                :class="isSelected(item._id) ? 'btn-success' : 'btn-outline-secondary'">
                <i :class="isSelected(item._id) ? 'bi bi-check-circle-fill' : 'bi bi-plus-circle'"></i>
                {{ isSelected(item._id) ? 'Added' : 'Add to Builder' }}
              </button>
              <div class="btn-group" v-if="isAdminUser">
                <button @click="openEditModal(item)" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-pencil-square"></i>
                </button>
                <button @click="deleteItem(item._id)" class="btn btn-sm btn-outline-danger">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <nav v-if="chordTotalPages > 1" class="mt-4 d-flex justify-content-center">
      <ul class="pagination pagination-app flex-wrap">
        <li class="page-item" :class="{ disabled: chordCurrentPage === 1 }">
          <a class="page-link" href="#" @click.prevent="goToChordPage(chordCurrentPage - 1)"><i class="bi bi-chevron-left"></i></a>
        </li>
        <li v-for="p in chordTotalPages" :key="p" class="page-item" :class="{ active: p === chordCurrentPage }">
          <a class="page-link" href="#" @click.prevent="goToChordPage(p)">{{ p }}</a>
        </li>
        <li class="page-item" :class="{ disabled: chordCurrentPage === chordTotalPages }">
          <a class="page-link" href="#" @click.prevent="goToChordPage(chordCurrentPage + 1)"><i class="bi bi-chevron-right"></i></a>
        </li>
      </ul>
    </nav>

    <div v-if="selectedItems.length > 0" class="floating-bar">
      <span class="floating-bar__count">
        <strong>{{ selectedItems.length }}</strong> item{{ selectedItems.length > 1 ? 's' : '' }} selected
      </span>
      <div class="floating-bar__actions">
        <button class="btn btn-primary-app btn-sm" @click="switchTab('builder')">
          <i class="bi bi-layers-fill me-1"></i> Builder
        </button>
        <button class="btn btn-outline-light btn-sm" @click="clearSelection">
          <i class="bi bi-x"></i> Clear
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       TAB: DETAIL PAGE
  ══════════════════════════════════════════════════════ -->
  <div v-show="activeTab === 'detail'" class="container-fluid px-3 px-md-4 py-3">
    <div v-if="detailItem">
      <div class="detail-topbar">
        <button class="btn btn-outline-secondary btn-sm" @click="goBackFromDetail()">
          <i class="bi bi-arrow-left me-1"></i> Back
        </button>
        <div class="d-flex gap-2 align-items-center flex-wrap">
          <button class="btn btn-sm"
            :class="isSelected(detailItem._id) ? 'btn-success' : 'btn-primary-app'"
            @click="toggleSelect(detailItem)">
            <i :class="isSelected(detailItem._id) ? 'bi bi-check-circle-fill' : 'bi bi-plus-circle'" class="me-1"></i>
            {{ isSelected(detailItem._id) ? 'Added to Builder' : 'Add to Builder' }}
          </button>
          <div class="btn-group" v-if="isAdminUser">
            <button @click="openEditModal(detailItem)" class="btn btn-sm btn-outline-primary">
              <i class="bi bi-pencil-square me-1"></i> Edit
            </button>
            <button @click="deleteItem(detailItem._id)" class="btn btn-sm btn-outline-danger">
              <i class="bi bi-trash me-1"></i> Delete
            </button>
          </div>
        </div>
      </div>

      <div class="detail-card mt-3">
        <div class="detail-card__header">
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="content-card__category">{{ detailItem.category }}</span>
            <span v-if="detailItem.contentType === 'chord'" class="chord-type-badge">
              <i class="bi bi-music-note-beamed"></i> Chords
            </span>
          </div>
          <h1 class="detail-card__title">{{ detailItem.title }}</h1>
          <div class="detail-card__meta">
            <span><i class="bi bi-person-fill me-1"></i>{{ detailItem.author }}</span>
            <span><i class="bi bi-calendar3 me-1"></i>{{ formatDate(detailItem.createdAt) }}</span>
          </div>
          <div v-if="detailItem.tags && detailItem.tags.length" class="content-card__tags mt-2">
            <span v-for="tag in detailItem.tags" :key="tag" class="tag-pill">{{ tag }}</span>
          </div>
        </div>
        <hr class="detail-card__divider" />

        <!-- Autoscroll control bar (chord items only) -->
        <div v-if="detailItem.contentType === 'chord'" class="autoscroll-bar">
          <button class="autoscroll-bar__btn" @click="toggleAutoscroll"
            :class="{ 'autoscroll-bar__btn--active': autoscroll.active }">
            <i :class="autoscroll.active ? 'bi bi-pause-fill' : 'bi bi-play-fill'"></i>
            {{ autoscroll.active ? 'Pause Scroll' : 'Auto Scroll' }}
          </button>
          <div class="autoscroll-bar__speed">
            <span class="autoscroll-bar__label">Speed</span>
            <input type="range" class="autoscroll-bar__range"
              v-model.number="autoscroll.speed" min="0.25" max="10" step="0.25" />
            <span class="autoscroll-bar__val">{{ autoscroll.speed }}x</span>
          </div>
          <button class="autoscroll-bar__top" @click="scrollToTop()"
            title="Back to top">
            <i class="bi bi-arrow-up-circle"></i>
          </button>
        </div>

        <div class="detail-card__body"
          :class="{ 'detail-card__body--chord': detailItem.contentType === 'chord' }">{{ detailItem.body }}</div>
        <template v-if="hasResources(detailItem)">
          <hr class="detail-card__divider" />
          <div class="detail-card__resources">
            <div class="detail-resources__title"><i class="bi bi-headphones me-1"></i> Resources</div>
            <div v-if="activeSingers(detailItem).length" class="detail-resources__group">
              <div class="detail-resources__group-label"><i class="bi bi-mic-fill me-1"></i> Singers</div>
              <div class="detail-resources__links">
                <a v-for="part in activeSingers(detailItem)" :key="part"
                  :href="detailItem.voicings[part]" target="_blank" rel="noopener"
                  class="detail-resource-link detail-resource-link--audio">
                  <i class="bi bi-play-circle-fill me-1"></i> {{ voicingLabel(part) }}
                </a>
              </div>
            </div>
            <div v-if="activeInstruments(detailItem).length" class="detail-resources__group">
              <div class="detail-resources__group-label"><i class="bi bi-guitar me-1"></i> Instruments</div>
              <div class="detail-resources__links">
                <a v-for="part in activeInstruments(detailItem)" :key="part"
                  :href="detailItem.voicings[part]" target="_blank" rel="noopener"
                  class="detail-resource-link detail-resource-link--audio">
                  <i class="bi bi-play-circle-fill me-1"></i> {{ voicingLabel(part) }}
                </a>
              </div>
            </div>
            <div v-if="detailItem.scoreUrl" class="detail-resources__group">
              <div class="detail-resources__group-label"><i class="bi bi-file-earmark-music-fill me-1"></i> Music Score</div>
              <div class="detail-resources__links">
                <a :href="detailItem.scoreUrl" target="_blank" rel="noopener"
                  class="detail-resource-link detail-resource-link--score">
                  <i class="bi bi-file-earmark-pdf-fill me-1"></i> View Music Score
                </a>
              </div>
            </div>
          </div>
        </template>
      </div>

          </div>
          <p class="builder-panel__hint">Drag rows or use arrows to reorder sections.</p>
          <div class="builder-list">
            <div v-for="(item, idx) in selectedItems" :key="item._id"
              class="builder-row" draggable="true"
              @dragstart="dragStart(idx)" @dragover.prevent="dragOver(idx)" @dragend="dragEnd"
              :class="{ 'builder-row--drag': dragIndex === idx }">
              <div class="builder-row__drag-handle"><i class="bi bi-grip-vertical"></i></div>
              <div class="builder-row__num">{{ idx + 1 }}</div>
              <div class="builder-row__info">
                <div class="builder-row__title">{{ item.title }}</div>
                <div class="builder-row__meta">
                  {{ item.category }} · {{ item.author }}
                  <span v-if="item.contentType === 'chord'" class="chord-badge ms-1">Chord</span>
                </div>
              </div>
              <div class="builder-row__actions">
                <button class="btn btn-icon" :disabled="idx === 0" @click="moveItem(idx, idx - 1)" title="Move up">
                  <i class="bi bi-arrow-up"></i>
                </button>
                <button class="btn btn-icon" :disabled="idx === selectedItems.length - 1" @click="moveItem(idx, idx + 1)" title="Move down">
                  <i class="bi bi-arrow-down"></i>
                </button>
                <button class="btn btn-icon btn-icon--danger" @click="removeFromBuilder(idx)" title="Remove">
                  <i class="bi bi-x-lg"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

              <input type="email" class="form-control" v-model="adminCreateForm.email" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="pw-wrap">
                <input :type="showCreatePassword ? 'text' : 'password'"
                  class="form-control" v-model="adminCreateForm.password" required />
                <button type="button" class="pw-toggle" @click="showCreatePassword = !showCreatePassword"
                  :title="showCreatePassword ? 'Hide password' : 'Show password'">
                  <i :class="showCreatePassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>
              </div>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="isAdminCheckbox" v-model="adminCreateForm.isAdmin" />
              <label class="form-check-label" for="isAdminCheckbox">Create as Administrator</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-success">Create Account</button>
          </div>
        </form>
      </div>
    </div>
  </div>
